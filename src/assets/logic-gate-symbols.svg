<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Logic Gate Symbols</title>
  <desc id="desc">Reference image showing OR, NOR, AND, NAND, XOR, XNOR, Buffer, and NOT symbols.</desc>
  <rect width="1200" height="630" fill="#7a4a10" />
  <g fill="none" stroke="#f8fafc" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <text x="600" y="105" text-anchor="middle" fill="#f8fafc" stroke="none" font-family="Arial, sans-serif" font-size="78" font-weight="500">Logic Gate Symbols</text>

    <!-- OR -->
    <g transform="translate(70 160)">
      <line x1="0" y1="45" x2="35" y2="45" />
      <line x1="0" y1="95" x2="35" y2="95" />
      <path d="M35 20 Q102 20 155 70 Q102 120 35 120" />
      <path d="M35 20 Q72 70 35 120" />
      <line x1="155" y1="70" x2="200" y2="70" />
      <text x="85" y="225" text-anchor="middle" fill="#f8fafc" stroke="none" font-family="Arial, sans-serif" font-size="52">OR</text>
    </g>

    <!-- NOR -->
    <g transform="translate(325 160)">
      <line x1="0" y1="45" x2="35" y2="45" />
      <line x1="0" y1="95" x2="35" y2="95" />
      <path d="M35 20 Q102 20 155 70 Q102 120 35 120" />
      <path d="M35 20 Q72 70 35 120" />
      <circle cx="171" cy="70" r="12" />
      <line x1="183" y1="70" x2="220" y2="70" />
      <text x="95" y="225" text-anchor="middle" fill="#f8fafc" stroke="none" font-family="Arial, sans-serif" font-size="52">NOR</text>
    </g>

    <!-- AND -->
    <g transform="translate(630 160)">
      <line x1="0" y1="45" x2="35" y2="45" />
      <line x1="0" y1="95" x2="35" y2="95" />
      <path d="M35 20 H98 A50 50 0 0 1 98 120 H35 Z" />
      <line x1="148" y1="70" x2="193" y2="70" />
      <text x="92" y="225" text-anchor="middle" fill="#f8fafc" stroke="none" font-family="Arial, sans-serif" font-size="52">AND</text>
    </g>

    <!-- NAND -->
    <g transform="translate(885 160)">
      <line x1="0" y1="45" x2="35" y2="45" />
      <line x1="0" y1="95" x2="35" y2="95" />
      <path d="M35 20 H98 A50 50 0 0 1 98 120 H35 Z" />
      <circle cx="162" cy="70" r="12" />
      <line x1="174" y1="70" x2="220" y2="70" />
      <text x="98" y="225" text-anchor="middle" fill="#f8fafc" stroke="none" font-family="Arial, sans-serif" font-size="52">NAND</text>
    </g>

    <!-- XOR -->
    <g transform="translate(70 390)">
      <line x1="0" y1="45" x2="35" y2="45" />
      <line x1="0" y1="95" x2="35" y2="95" />
      <path d="M35 20 Q102 20 155 70 Q102 120 35 120" />
      <path d="M35 20 Q72 70 35 120" />
      <path d="M20 20 Q57 70 20 120" />
      <line x1="155" y1="70" x2="200" y2="70" />
      <text x="88" y="225" text-anchor="middle" fill="#f8fafc" stroke="none" font-family="Arial, sans-serif" font-size="52">XOR</text>
    </g>

    <!-- XNOR -->
    <g transform="translate(325 390)">
      <line x1="0" y1="45" x2="35" y2="45" />
      <line x1="0" y1="95" x2="35" y2="95" />
      <path d="M35 20 Q102 20 155 70 Q102 120 35 120" />
      <path d="M35 20 Q72 70 35 120" />
      <path d="M20 20 Q57 70 20 120" />
      <circle cx="171" cy="70" r="12" />
      <line x1="183" y1="70" x2="220" y2="70" />
      <text x="95" y="225" text-anchor="middle" fill="#f8fafc" stroke="none" font-family="Arial, sans-serif" font-size="52">XNOR</text>
    </g>

    <!-- Buffer -->
    <g transform="translate(630 390)">
      <line x1="0" y1="70" x2="48" y2="70" />
      <path d="M48 20 L48 120 L135 70 Z" />
      <line x1="135" y1="70" x2="185" y2="70" />
      <text x="92" y="225" text-anchor="middle" fill="#f8fafc" stroke="none" font-family="Arial, sans-serif" font-size="52">Buffer</text>
    </g>

    <!-- NOT -->
    <g transform="translate(885 390)">
      <line x1="0" y1="70" x2="48" y2="70" />
      <path d="M48 20 L48 120 L135 70 Z" />
      <circle cx="150" cy="70" r="12" />
      <line x1="162" y1="70" x2="220" y2="70" />
      <text x="92" y="225" text-anchor="middle" fill="#f8fafc" stroke="none" font-family="Arial, sans-serif" font-size="52">NOT</text>
    </g>
  </g>
</svg>
